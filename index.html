<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let bird, pipes, frame, score, gameOver;

function resetGame() {
  bird = {
    x: 80,
    y: 200,
    radius: 12,
    gravity: 0.6,
    lift: -10,
    velocity: 0
  };

  pipes = [];
  frame = 0;
  score = 0;
  gameOver = false;

  document.getElementById("score").innerText = score;
}

resetGame();

function drawBird() {
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawPipes() {
  ctx.fillStyle = "green";
  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipe.width, pipe.bottom);
  });
}

function updatePipes() {
  if (frame % 90 === 0) {
    let gap = 140;
    let top = Math.random() * (canvas.height - gap - 100) + 20;
    pipes.push({
      x: canvas.width,
      width: 50,
      top: top,
      bottom: canvas.height - top - gap
    });
  }

  pipes.forEach(pipe => {
    pipe.x -= 2;

    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + pipe.width &&
      (bird.y - bird.radius < pipe.top ||
       bird.y + bird.radius > canvas.height - pipe.bottom)
    ) {
      gameOver = true;
    }

    if (!pipe.passed && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.passed = true;
      document.getElementById("score").innerText = score;
    }
  });

  pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);
}

function updateBird() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
    gameOver = true;
  }
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    updateBird();
    updatePipes();
    frame++;
  }

  drawBird();
  drawPipes();

  if (gameOver) {
    ctx.fillStyle = "black";
    ctx.font = "40px Arial";
    ctx.fillText("Game Over", 80, 280);
    ctx.font = "20px Arial";
    ctx.fillText("Click or press space to restart", 60, 320);
  }

  requestAnimationFrame(loop);
}

// Controls
function flap() {
  if (gameOver) {
    resetGame();
  } else {
    bird.velocity = bird.lift;
  }
}

window.addEventListener("keydown", (e) => {
  if (e.code === "Space") flap();
});

window.addEventListener("click", flap);

loop();
</script>
